<div class="min-h-screen bg-bg-page p-4 md:p-8" dir="ltr">
  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    <div class="lg:col-span-3 order-1 lg:order-2">
      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-6 sticky top-8">
        <div
          class="hidden lg:flex mb-1 lg:mb-2 justify-center text-sm lg:text-base bg-accent-soft border border-main/30 rounded-xl"
        >
          <p-selectbutton
            [options]="[
              { label: 'AR', value: 'rtl' },
              { label: 'EN', value: 'ltr' },
            ]"
            [(ngModel)]="dir"
            optionLabel="label"
            optionValue="value"
            class="border border-main text-white"
            aria-labelledby="basic"
          />
        </div>
        <div class="bg-primary-50 rounded-2xl p-4 text-center mb-6 border border-primary-100">
          <span class="text-sm lg:text-base text-main font-bold block mb-1">الوقت المتبقي</span>
          <span class="text-lg lg:text-xl font-mono font-black text-main/40 tracking-tighter">
            {{ quizState.timerTest() }}
          </span>
        </div>

        <div class="hidden lg:grid lg:grid-cols-4 lg:gap-3 lg:mb-8">
          @for (q of data(); track q.id; let i = $index) {
            <button
              (click)="jumpTo(q.id!)"
              [class]="
                currentQuesId() === q.id
                  ? 'bg-main text-white border-main ring-2 ring-indigo-100'
                  : isAnswered(q.id!)
                    ? 'bg-green-100 text-green-700 border-green-200'
                    : 'bg-gray-50 text-gray-400 border-gray-200'
              "
              class="cursor-pointer w-full aspect-square rounded-xl font-semibold text-sm lg:text-base transition-all border flex items-center justify-center relative hover:shadow-md"
            >
              {{ i + 1 }}
              @if (isMarked(q.id!)) {
                <span class="absolute -top-1 -right-1 flex h-3 w-3">
                  <span
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"
                  ></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
                </span>
              }
            </button>
          }
        </div>

        <button
          pButton
          label="إنهاء الاختبار"
          class="w-full p-button-danger lg:text-base text-sm lg:py-3 py-2 rounded-xl shadow-lg shadow-red-100"
          tooltipPosition="top"
          (click)="finishTest()"
        ></button>
      </div>
    </div>

    <div class="lg:col-span-9 order-2 lg:order-1" [dir]="dir()">
      @if (currentQuestion(); as q) {
        <div class="animate-fadein">
          <app-question-carde
            [question]="q"
            [savedAnswerId]="quizState.getAnswer(q.id!)"
            [isTestMode]="true"
            (answerSelect)="quizState.saveAnswer(q.id!, $event)"
          />
        </div>

        <div class="flex justify-between mt-6 px-2 items-center bg-white lg:p-4 p-2 rounded-2xl shadow-sm">
          <button
            pButton
            icon="pi pi-chevron-left"
            iconPos="left"
            label="السابق"
            class="p-button-text text-text-muted font-semibold cursor-pointer lg:text-base md:text-sm text-xs lg:py-3 py-2"
            (click)="jumpToPrev()"
            [disabled]="getCurrentIndex() <= 0"
          ></button>
       @if (screenSize() >= 1024) {
          <button
            pButton
            [icon]="isMarked(q.id!) ? 'pi pi-bookmark-fill' : 'pi pi-bookmark'"
            [label]="isMarked(q.id!) ? 'تم التمييز' : 'تميز للمراجعة'"
            (click)="toggleBookmark(q.id!)"
            class="p-button-warning p-button-text cursor-pointer"
          ></button>
       }
          <button
            pButton
            icon="pi pi-chevron-right"
            iconPos="right"
            label="التالي"
            class="p-button-text text-main font-semibold cursor-pointer lg:text-base md:text-sm text-xs lg:py-3 py-2"
            (click)="jumpToNext()"
            [disabled]="getCurrentIndex() >= (data().length || 0) - 1"
          ></button>
        </div>
      } @else {
        <div class="bg-white rounded-3xl p-20 text-center shadow-sm">
          <i class="pi pi-spin pi-spinner text-4xl text-main"></i>
          <p class="mt-4 text-text-muted">جاري تحميل السؤال...</p>
        </div>
      }
    </div>
  </div>
</div>
