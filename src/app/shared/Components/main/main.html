<div class="flex flex-col min-h-screen" [dir]="dir.currentDir()">
  @if (rateLimitService.isGlobalLocked()) {
    <app-lock-ui type="global"></app-lock-ui>
  } @else {
    @if (shouldShowHeaderFooter()) {
      <app-nav></app-nav>
    }

    <main class="grow">
      <router-outlet></router-outlet>
    </main>

    @if (shouldShowHeaderFooter()) {
      <app-footer></app-footer>
    }
  }
</div>
